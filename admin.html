<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="لوحة تحكم تِبْر.">
  <title>لوحة التحكم · تِبْر</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..700;1,6..96,400..600&family=Hanken+Grotesk:wght@400;500;600;700&family=Reem+Kufi:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/store/tokens.css">
  <link rel="stylesheet" href="/css/store/base.css">
  <link rel="stylesheet" href="/css/store/chrome.css">
  <link rel="stylesheet" href="/css/store/components.css">
  <link rel="stylesheet" href="/css/store/pages.css">
</head>
<body data-nav="" data-title-ar="لوحة التحكم · تِبْر" data-title-en="Control panel · Tibr">
  <a class="skip-link" href="#main"><span data-lang-ar>تخطَّ إلى المحتوى</span><span data-lang-en>Skip to content</span></a>

  <main id="main" class="store-container">
    <header class="page-head">
      <h1 class="page-head__title"><span data-lang-ar>لوحة التحكم</span><span data-lang-en>Control panel</span></h1>
      <p class="page-head__sub"><span data-lang-ar>إدارة الطلبات وتحديث حالات التوصيل.</span><span data-lang-en>Manage orders and update delivery status.</span></p>
    </header>

    <div class="admin-stats" id="admin-stats"></div>

    <div class="admin-toolbar">
      <div class="admin-filters" role="group" aria-label="تصفية حسب الحالة">
        <button class="filter-chip" type="button" data-status="all" aria-pressed="true"><span data-lang-ar>الكل</span><span data-lang-en>All</span></button>
        <button class="filter-chip" type="button" data-status="pending" aria-pressed="false"><span data-lang-ar>قيد المراجعة</span><span data-lang-en>Pending</span></button>
        <button class="filter-chip" type="button" data-status="confirmed" aria-pressed="false"><span data-lang-ar>مؤكّد</span><span data-lang-en>Confirmed</span></button>
        <button class="filter-chip" type="button" data-status="shipped" aria-pressed="false"><span data-lang-ar>في الطريق</span><span data-lang-en>Shipped</span></button>
        <button class="filter-chip" type="button" data-status="delivered" aria-pressed="false"><span data-lang-ar>تم التوصيل</span><span data-lang-en>Delivered</span></button>
        <button class="filter-chip" type="button" data-status="cancelled" aria-pressed="false"><span data-lang-ar>ملغي</span><span data-lang-en>Cancelled</span></button>
      </div>
      <p class="catalog-count" id="admin-count" aria-live="polite"></p>
    </div>

    <div class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th><span data-lang-ar>رقم الطلب</span><span data-lang-en>Order</span></th>
            <th><span data-lang-ar>العميل</span><span data-lang-en>Customer</span></th>
            <th><span data-lang-ar>المنتجات</span><span data-lang-en>Items</span></th>
            <th><span data-lang-ar>الإجمالي</span><span data-lang-en>Total</span></th>
            <th><span data-lang-ar>التاريخ</span><span data-lang-en>Date</span></th>
            <th><span data-lang-ar>الحالة</span><span data-lang-en>Status</span></th>
          </tr>
        </thead>
        <tbody id="admin-rows"></tbody>
      </table>
    </div>
    <div id="admin-empty"></div>
  </main>

  <script src="/js/store/chrome.js" defer></script>
  <script src="/js/store/admin.js" defer></script>
<!-- impeccable-live-start -->
<script src="http://localhost:8400/live.js"></script>
<!-- impeccable-live-end -->
</body>
</html>
